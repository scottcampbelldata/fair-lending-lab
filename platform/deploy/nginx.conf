# /etc/nginx/sites-available/fair-lending-api.scottcampbell.io.conf
# Reverse proxy from the public API hostname to the uvicorn process on 127.0.0.1:8702.
#
# This is the pre-TLS (port 80) template. After the DNS A record points at the VPS,
# running
#   sudo certbot --nginx -d fair-lending-api.scottcampbell.io
# rewrites this file to add the HTTPS (443) server block, the cert paths, and an
# HTTP->HTTPS redirect automatically. Do NOT hand-write the 443 block here: nginx -t
# would fail because the certificate files do not exist until certbot has run.

server {
    listen 80;
    listen [::]:80;
    server_name fair-lending-api.scottcampbell.io;

    # Tight defaults for a JSON-only API; no large uploads expected.
    client_max_body_size 1m;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/fair-lending-api.access.log;
    error_log  /var/log/nginx/fair-lending-api.error.log warn;

    location / {
        proxy_pass http://127.0.0.1:8702;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
