# /etc/nginx/sites-available/fair-lending-api.scottcampbell.io
# Reverse proxy from the public API hostname to the uvicorn process on 127.0.0.1:8702.
# TLS terminated by certbot (Let's Encrypt).

server {
    listen 80;
    listen [::]:80;
    server_name fair-lending-api.scottcampbell.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fair-lending-api.scottcampbell.io;

    ssl_certificate     /etc/letsencrypt/live/fair-lending-api.scottcampbell.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fair-lending-api.scottcampbell.io/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Tight defaults for a JSON-only API.
    client_max_body_size 1m;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Browser-cache GETs for 60 seconds on the API. The Next.js client also passes
    # cache: no-store, so the dashboard always sees fresh numbers when refreshed.
    location / {
        proxy_pass http://127.0.0.1:8702;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    access_log /var/log/nginx/fair-lending-api.access.log;
    error_log  /var/log/nginx/fair-lending-api.error.log warn;
}
