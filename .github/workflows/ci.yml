name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: fair_lending_lab
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGDATABASE: fair_lending_lab
      PGUSER: postgres
      PGPASSWORD: postgres
      FLAB_HMDA_YEAR: "2023"
      FLAB_HMDA_STATE: MA
      FLAB_RANDOM_SEED: "20260625"
    steps:
      - uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: install backend
        working-directory: platform
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e .[dev]

      - name: lint
        working-directory: platform
        run: ruff check flab tests

      - name: scan for em or en dashes in source
        run: |
          if grep -RPn "[\x{2013}\x{2014}]" platform/flab platform/tests frontend/src; then
            echo "forbidden em or en dash found"
            exit 1
          fi

      - name: apply schema
        working-directory: platform
        run: psql "postgresql://postgres:postgres@localhost:5432/fair_lending_lab" -f flab/db/schema.sql

      - name: pytest
        working-directory: platform
        run: pytest -ra

  frontend:
    name: frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: https://fair-lending-api.scottcampbell.io
